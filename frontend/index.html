<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Autonomous OS Agent 2.0 - Human-in-the-Loop task execution dashboard">
  <title>Agent 2.0 — Autonomous OS Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="app-header">
    <div class="header-left">
      <div class="logo-mark" aria-hidden="true"></div>
      <h1>Agent <span class="accent">2.0</span></h1>
    </div>
    <div class="header-right">
      <kbd class="hint" title="Ctrl+L to clear">Ctrl+L</kbd>
      <div id="connection-status" class="status-badge disconnected" role="status" aria-live="polite">
        <span class="status-dot"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </div>
  </header>

  <main id="workspace">
    <section id="input-panel" class="panel" aria-label="Task Input">
      <h2 class="panel-title">Task Input</h2>
      <form id="task-form" autocomplete="off">
        <label for="task-input" class="sr-only">Enter your task</label>
        <textarea
          id="task-input"
          placeholder="Describe what you want the agent to do…"
          rows="6"
          autofocus
          aria-describedby="input-hint"
        ></textarea>
        <p id="input-hint" class="hint-text">Press <kbd>Enter</kbd> to submit · <kbd>Shift+Enter</kbd> for newline</p>
        <button type="submit" id="submit-btn" class="btn-primary">
          <span class="btn-text">Execute Task</span>
          <span class="btn-spinner hidden" aria-hidden="true"></span>
        </button>
      </form>
      <div id="session-info" class="meta-text">
        Session: <code id="session-id">—</code>
      </div>
    </section>

    <section id="output-panel" class="panel" aria-label="Output & History">
      <div class="panel-header">
        <h2 class="panel-title">Output</h2>
        <button id="clear-btn" class="btn-ghost" title="Clear output (Ctrl+L)" aria-label="Clear output">✕</button>
      </div>
      <div id="output-log" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="empty-state" class="empty-state">
        <div class="empty-icon" aria-hidden="true">⌘</div>
        <p>No output yet. Submit a task to begin.</p>
      </div>
    </section>
  </main>

  <!-- HITL Approval Modal -->
  <div id="hitl-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal" id="hitl-modal">
      <div class="modal-pulse" aria-hidden="true"></div>
      <header class="modal-header">
        <h2 id="modal-title">⚠ Approval Required</h2>
        <div id="risk-badge" class="risk-badge" aria-label="Risk score">
          <span id="risk-score-value">0</span>
        </div>
      </header>
      <div class="modal-body">
        <div class="detail-row">
          <span class="detail-label">Task ID</span>
          <code id="modal-task-id" class="detail-value">—</code>
        </div>
        <div class="detail-row">
          <span class="detail-label">Risk Level</span>
          <span id="modal-risk-level" class="detail-value risk-text">—</span>
        </div>
        <div class="detail-row command-row">
          <span class="detail-label">Command</span>
          <pre id="modal-command" class="command-block"></pre>
        </div>
        <div class="detail-row">
          <span class="detail-label">Reasons</span>
          <ul id="modal-reasons" class="reasons-list"></ul>
        </div>
      </div>
      <footer class="modal-footer">
        <button id="deny-btn" class="btn-danger" aria-label="Deny (Escape)">
          Deny <kbd>Esc</kbd>
        </button>
        <button id="allow-btn" class="btn-success" aria-label="Allow (Enter)">
          Allow <kbd>↵</kbd>
        </button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
